<svg viewBox="0 0 420 160" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- BLUE GRADIENT -->
    <linearGradient id="blueGrad" x1="0" y1="0" x2="420" y2="160" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2F80FF"></stop>
      <stop offset="0.5" stop-color="#015DFF"></stop>
      <stop offset="1" stop-color="#003FCC"></stop>
    </linearGradient>

    <!-- GREEN GRADIENT -->
    <linearGradient id="greenGrad" x1="0" y1="0" x2="220" y2="120" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ABE1CC"></stop>
      <stop offset="1" stop-color="#83D9DC"></stop>
    </linearGradient>
  </defs>

  <!-- FULL BACKGROUND -->
  <rect width="420" height="160" fill="url(#blueGrad)"></rect>

  <!-- ANGLED SHAPE -->
  <path d="M0 0 L260 0 L150 160 L0 120 Z" fill="url(#greenGrad)"></path>
</svg>